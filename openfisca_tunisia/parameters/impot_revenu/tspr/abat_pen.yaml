  notes:
    2027-01-01:
    - note: L'abattement de 25% sur le montant brut des pensions et rentes viagères (art. 26-II du code de l'IRPP) est relevé à 30% à partir du 1er janvier 2027, 40% à partir du 1er janvier 2028 et 50% à partir du 1er janvier 2029. La valeur 2026 reste à 25%.
